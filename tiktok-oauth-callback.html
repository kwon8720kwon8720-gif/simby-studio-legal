<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8" />
  <title>Simby Studio OAuth Callback</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <style>
    body { font-family: -apple-system, BlinkMacSystemFont, sans-serif; max-width: 560px; margin: 48px auto; padding: 0 16px; line-height: 1.5; }
    .ok { color: #0a7a32; }
    .err { color: #b00020; }
    code { word-break: break-all; }
  </style>
</head>
<body>
  <h1>Simby Studio</h1>
  <p id="msg">로그인 처리 중…</p>
  <script>
    (function () {
      const params = new URLSearchParams(window.location.search);
      const err = params.get('error');
      const code = params.get('code');
      const msg = document.getElementById('msg');
      if (err) {
        msg.className = 'err';
        msg.textContent = '로그인 오류: ' + err;
        return;
      }
      if (!code) {
        msg.className = 'err';
        msg.textContent = 'code가 없습니다. 다시 로그인해주세요.';
        return;
      }
      // Forward to local callback server
      const local = 'http://127.0.0.1:8787/callback?' + params.toString();
      msg.innerHTML = '로컬 앱으로 연결 중…<br><small>안 넘어가면 <a href="' + local + '">여기</a>를 누르세요.</small>';
      window.location.replace(local);
    })();
  </script>
</body>
</html>
