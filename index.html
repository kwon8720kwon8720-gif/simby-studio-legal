<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Simby Studio</title>
  <style>
    :root { color-scheme: light; --bg:#0f1419; --fg:#e8eef4; --muted:#9aabba; --accent:#6ec1ff; }
    body { margin:0; font-family: ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, Helvetica, Arial, sans-serif; background:linear-gradient(160deg,#0f1419 0%,#1a2430 55%,#12202b 100%); color:var(--fg); min-height:100vh; }
    main { max-width:720px; margin:0 auto; padding:48px 20px 80px; }
    h1 { font-size:2rem; letter-spacing:-0.02em; margin:0 0 12px; }
    p { color:var(--muted); line-height:1.6; }
    a { color:var(--accent); }
    ul { line-height:1.8; padding-left:1.2rem; }
    .card { margin-top:28px; padding:20px 22px; border:1px solid rgba(255,255,255,.08); border-radius:14px; background:rgba(255,255,255,.03); }
  </style>
</head>
<body>
  <main>
    <h1>Simby Studio</h1>
    <p>Local automation tools for publishing Roblox gameplay Shorts to YouTube and TikTok using official platform APIs after user authorization.</p>
    <div class="card">
      <ul>
        <li><a href="./terms/">Terms of Service</a></li>
        <li><a href="./privacy/">Privacy Policy</a></li>
      </ul>
    </div>
  </main>
</body>
</html>
